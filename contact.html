<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | QR Lab Support & Inquiries</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 600px; padding: 50px;">
        
        <div style="margin-bottom: 30px;">
            <h1 style="font-size: 32px; margin-bottom: 10px;">Get in Touch</h1>
            <p style="color: var(--text-secondary); font-size: 16px;">Have a question, feature request, or business inquiry? We would love to hear from you.</p>
        </div>
        
        <div style="background: var(--panel-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 30px; text-align: left;">
            <h3 style="margin-top: 0; color: var(--text-primary); font-size: 18px; margin-bottom: 5px;">Developer Contact</h3>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Collabs Developers Support Team</p>
            
            <div style="display: flex; align-items: center; gap: 15px; background: var(--input-bg); padding: 15px 20px; border-radius: 10px; border: 1px solid var(--border-color);">
                <svg width="24" height="24" fill="none" stroke="var(--primary-color)" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"></path>
                </svg>
                <a href="mailto:founder@collabs.eu.org" style="color: var(--text-primary); font-weight: 600; text-decoration: none; font-size: 16px;">
                    founder@collabs.eu.org
                </a>
            </div>
        </div>

        <a href="index.html" style="display: inline-block; background-color: var(--primary-color); color: white; text-decoration: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; transition: all 0.2s ease;">
            Return to Generator
        </a>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
